name: Refresh IMD heatwave + SHRAM daily peak

# Runs twice a day to capture both IMD bulletins and SHRAM's daily peak zone:
#   - Morning  : 14:00 IST = 08:30 UTC  (after IMD's morning forecast bulletin)
#   - Evening  : 19:00 IST = 13:30 UTC  (after IMD's evening confirmed bulletin
#                                         and SHRAM's daily peak hours)
#
# Cron is best-effort on GitHub Actions — runs can drift by 5–30 minutes during
# peak load. Acceptable for our cadence; the dashboard reads the latest file
# regardless of arrival time.

on:
  schedule:
    - cron: '30 8 * * *'   # 14:00 IST
    - cron: '30 13 * * *'  # 19:30 IST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Smoke test — IMD Mausam API (will 403 from GitHub-hosted runners)
        continue-on-error: true
        env:
          IMD_API_KEY: ${{ secrets.IMD_API_KEY }}
          IMD_EMAIL: ${{ secrets.IMD_EMAIL }}
          IMD_PASSWORD: ${{ secrets.IMD_PASSWORD }}
        run: python mausum_test.py

      - name: Fetch IMD district warnings (polygon, forecast horizon)
        run: python scripts/fetch_imd_districtwarning.py

      - name: Fetch IMD station heatwave bulletin (observed + forecast)
        run: python scripts/fetch_imd_heatwave.py

      - name: Archive SHRAM 7-day forecast (slim)
        run: python scripts/archive_shram_forecast.py

      - name: Compute / extend κ history
        run: python scripts/compute_kappa_history.py

      # Clone the data repo with write access. Needs SHRAM_DATA_TOKEN secret:
      # a fine-grained PAT with contents:write scoped to SHRAM-verification-data.
      - name: Clone SHRAM-verification-data (full, writable)
        run: |
          git clone https://x-access-token:${{ secrets.SHRAM_DATA_TOKEN }}@github.com/IECC-io/SHRAM-verification-data.git data
          # Mirror station history into the dashboard's expected path
          mkdir -p shram_stations_history
          rsync -a data/shram_stations_history/ shram_stations_history/

      - name: Compute SHRAM daily peak
        run: python scripts/compute_shram_daily_peak.py

      - name: Append historical comparison row (per-station + summary)
        run: python scripts/compute_imd_vs_shram_comparison.py --data-repo ./data

      - name: Commit refreshed dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reference_history/imd_heatwave_latest.json \
                  reference_history/imd_districtwarning_latest.json \
                  reference_history/imd_districtwarning/ \
                  reference_history/imd_station_heatwave_latest.json \
                  reference_history/imd_station_heatwave/ \
                  reference_history/shram_forecast_latest.json \
                  reference_history/shram_forecast/ \
                  reference_history/shram_daily_peak.json \
                  reference_history/imd_heatwave/ \
                  comparisons/kappa_history.csv
          if ! git diff --cached --quiet; then
            stamp="$(date -u +%Y-%m-%dT%H:%MZ)"
            git commit -m "chore: refresh IMD heatwave + SHRAM daily peak ($stamp)"
            git push
          else
            echo "Dashboard repo: no changes to commit."
          fi

      - name: Commit historical comparison rows to data repo
        working-directory: ./data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add comparisons/imd_vs_shram_daily.csv comparisons/imd_vs_shram_summary.csv
          if ! git diff --cached --quiet; then
            stamp="$(date -u +%Y-%m-%dT%H:%MZ)"
            git commit -m "data: append IMD-vs-SHRAM comparison ($stamp)"
            git push
          else
            echo "Data repo: no comparison changes to commit."
          fi
