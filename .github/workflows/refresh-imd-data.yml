name: Refresh IMD heatwave + SHRAM daily peak

# Runs twice a day to capture both IMD bulletins and SHRAM's daily peak zone:
#   - Morning  : 14:00 IST = 08:30 UTC  (after IMD's morning forecast bulletin)
#   - Evening  : 19:00 IST = 13:30 UTC  (after IMD's evening confirmed bulletin
#                                         and SHRAM's daily peak hours)
#
# Cron is best-effort on GitHub Actions — runs can drift by 5–30 minutes during
# peak load. Acceptable for our cadence; the dashboard reads the latest file
# regardless of arrival time.

on:
  schedule:
    - cron: '30 8 * * *'   # 14:00 IST
    - cron: '30 13 * * *'  # 19:30 IST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch IMD heatwave forecast
        run: python scripts/fetch_imd_heatwave.py

      # Compute SHRAM daily peak only if the data archive is reachable.
      # The repo doesn't ship station history (kept in SHRAM-verification-data),
      # so this step pulls the sibling repo as a sparse checkout.
      - name: Pull SHRAM station history (sparse)
        run: |
          mkdir -p shram_stations_history
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/IECC-io/SHRAM-verification-data.git data
          cd data && git sparse-checkout set shram_stations_history
          cd ..
          # Mirror the relevant subtree into the dashboard's expected path
          rsync -a data/shram_stations_history/ shram_stations_history/
          rm -rf data

      - name: Compute SHRAM daily peak
        run: python scripts/compute_shram_daily_peak.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reference_history/imd_heatwave_latest.json \
                  reference_history/shram_daily_peak.json \
                  reference_history/imd_heatwave/
          if ! git diff --cached --quiet; then
            stamp="$(date -u +%Y-%m-%dT%H:%MZ)"
            git commit -m "chore: refresh IMD heatwave + SHRAM daily peak ($stamp)"
            git push
          else
            echo "No changes to commit."
          fi
